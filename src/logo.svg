<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" width="220" height="64">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <!-- Icon: dark rounded square (matches site dark bg) -->
  <rect x="2" y="2" width="56" height="56" rx="14" fill="#1E2A2A"/>
  <rect x="2" y="2" width="56" height="56" rx="14" fill="none" stroke="#2DD4BF" stroke-width="1.5"/>

  <!-- T lettermark in teal -->
  <rect x="14" y="16" width="32" height="5" rx="2.5" fill="#2DD4BF"/>
  <rect x="27.5" y="21" width="5" height="22" rx="2.5" fill="#2DD4BF"/>

  <!-- AI pulse dots (visual impairment / signal motif) -->
  <circle cx="46" cy="40" r="2.5" fill="#2DD4BF" opacity="1"/>
  <circle cx="46" cy="31" r="1.8" fill="#2DD4BF" opacity="0.6"/>
  <circle cx="46" cy="23" r="1.2" fill="#2DD4BF" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="70" y="30"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="11"
    font-weight="700"
    letter-spacing="1.5"
    fill="#6B7280">MR.</text>
  <text x="88" y="30"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="2"
    fill="#2DD4BF">TRAVIS</text>

  <!-- Tagline -->
  <text x="70" y="46"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="9"
    font-weight="400"
    letter-spacing="2.5"
    fill="#6B7280">AI ASSISTANT</text>
</svg>
